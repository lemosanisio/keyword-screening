server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: pld-customer-analysis
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/customer_analysis}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: ${spring.application.name}
    milestone: marco-1-foundation
    eventing: outbox-inbox-sqs

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

pld:
  integration:
    outbox-drain:
      enabled: ${PLD_INTEGRATION_OUTBOX_DRAIN_ENABLED:false}
      initial-delay: ${PLD_INTEGRATION_OUTBOX_DRAIN_INITIAL_DELAY:PT5S}
      fixed-delay: ${PLD_INTEGRATION_OUTBOX_DRAIN_FIXED_DELAY:PT5S}
      limit: ${PLD_INTEGRATION_OUTBOX_DRAIN_LIMIT:50}
    sqs:
      enabled: ${PLD_INTEGRATION_SQS_ENABLED:false}
      region: ${PLD_INTEGRATION_SQS_REGION:us-east-1}
      endpoint: ${PLD_INTEGRATION_SQS_ENDPOINT:}
      access-key-id: ${PLD_INTEGRATION_SQS_ACCESS_KEY_ID:test}
      secret-access-key: ${PLD_INTEGRATION_SQS_SECRET_ACCESS_KEY:test}
      outbox-queue-url: ${PLD_INTEGRATION_SQS_OUTBOX_QUEUE_URL:}
