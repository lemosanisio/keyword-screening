spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/keyword_screening
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

coaf:
  analyzer:
    base-url: http://localhost:8080
    timeout-seconds: 30

contextual-screening:
  auto-close-threshold: 0.95

pld:
  integration:
    transaction-signals:
      enabled: ${PLD_TRANSACTION_SIGNALS_ENABLED:false}
      operational-events-enabled: ${PLD_TRANSACTION_EVALUATIONS_ENABLED:true}
      queue-url: ${PLD_TRANSACTION_SIGNALS_QUEUE_URL:}
    sqs:
      enabled: ${PLD_SQS_ENABLED:false}
      region: ${AWS_REGION:us-east-1}
      endpoint: ${PLD_SQS_ENDPOINT:}
      access-key-id: ${AWS_ACCESS_KEY_ID:test}
      secret-access-key: ${AWS_SECRET_ACCESS_KEY:test}
    outbox-drain:
      enabled: ${PLD_OUTBOX_DRAIN_ENABLED:false}
      initial-delay: ${PLD_OUTBOX_INITIAL_DELAY:PT5S}
      fixed-delay: ${PLD_OUTBOX_FIXED_DELAY:PT5S}
      limit: ${PLD_OUTBOX_BATCH_SIZE:50}
